[project]
name = "revit-mcp-server"
version = "0.1.1"
description = "Model Context Protocol server for Autodesk Revit via a local bridge"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [
    { name = "Sam-AEC" },
]
keywords = ["mcp", "revit", "autodesk", "bim", "ai"]
dependencies = [
    "pydantic>=2.5",
    "pydantic-settings>=1.3",
    "httpx>=0.24",
    "python-dotenv>=1.0",
    "mcp>=0.9.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "ruff>=0.0",
    "mypy>=1.8",
]

[project.urls]
Homepage = "https://github.com/Sam-AEC/Autodesk-Revit-MCP-Server"
Repository = "https://github.com/Sam-AEC/Autodesk-Revit-MCP-Server"
Issues = "https://github.com/Sam-AEC/Autodesk-Revit-MCP-Server/issues"

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"
